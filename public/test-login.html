<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TASKKASH - Test Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        
        .result.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .result.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .user-data {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .user-data h3 {
            margin-bottom: 10px;
            color: #667eea;
        }
        
        .user-data p {
            margin: 5px 0;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 TASKKASH Login Test</h1>
        
        <div class="form-group">
            <label for="userSelect">اختر المستخدم:</label>
            <select id="userSelect">
                <option value="ahmed@example.com">Ahmed Mohamed (Bronze)</option>
                <option value="fatima@example.com">Fatima Ali (Silver)</option>
                <option value="omar@example.com">Omar Hassan (Gold)</option>
                <option value="admin@taskkash.com">Admin User</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="password">كلمة المرور:</label>
            <input type="password" id="password" value="password123" placeholder="password123">
        </div>
        
        <button onclick="testLogin()">تسجيل الدخول</button>
        
        <div id="result" class="result"></div>
    </div>
    
    <script>
        async function testLogin() {
            const email = document.getElementById('userSelect').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.style.display = 'none';
            resultDiv.innerHTML = 'جاري تسجيل الدخول...';
            resultDiv.className = 'result';
            resultDiv.style.display = 'block';
            
            try {
                const response = await fetch('/api/trpc/auth.login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        json: { email, password }
                    })
                });
                
                const data = await response.json();
                
                if (data.result?.data?.json?.success) {
                    const user = data.result.data.json.user;
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h3>✅ نجح تسجيل الدخول!</h3>
                        <div class="user-data">
                            <h3>بيانات المستخدم:</h3>
                            <p><strong>الاسم:</strong> ${user.name}</p>
                            <p><strong>البريد:</strong> ${user.email}</p>
                            <p><strong>الرصيد:</strong> ${user.balance} EGP</p>
                            <p><strong>المهام المكتملة:</strong> ${user.completedTasks}</p>
                            <p><strong>إجمالي الأرباح:</strong> ${user.totalEarnings} EGP</p>
                            <p><strong>المستوى:</strong> ${user.tier}</p>
                            <p><strong>قوة الملف:</strong> ${user.profileStrength}%</p>
                        </div>
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = '❌ فشل تسجيل الدخول: ' + (data.error?.message || 'خطأ غير معروف');
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = '❌ خطأ في الاتصال: ' + error.message;
            }
        }
    </script>
</body>
</html>
