<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Test V2</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .test-user {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
        }
        button {
            background: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #45a049;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <h1>🔐 Login Test V2</h1>
    <p>Testing tRPC login endpoint</p>

    <div class="test-user">
        <h3>Ahmed Mohamed (Bronze)</h3>
        <p>Email: ahmed@example.com</p>
        <p>Password: password123</p>
        <button onclick="testLogin('ahmed@example.com', 'password123')">Test Login</button>
    </div>

    <div class="test-user">
        <h3>Fatima Ali (Silver)</h3>
        <p>Email: fatima@example.com</p>
        <p>Password: password123</p>
        <button onclick="testLogin('fatima@example.com', 'password123')">Test Login</button>
    </div>

    <div class="test-user">
        <h3>Omar Hassan (Gold)</h3>
        <p>Email: omar@example.com</p>
        <p>Password: password123</p>
        <button onclick="testLogin('omar@example.com', 'password123')">Test Login</button>
    </div>

    <div id="result"></div>

    <script>
        async function testLogin(email, password) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>⏳ Testing login...</p>';

            try {
                // Test with tRPC batch format
                const response = await fetch('/api/trpc/auth.login?batch=1', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        "0": {
                            input: {
                                email: email,
                                password: password
                            }
                        }
                    }),
                    credentials: 'include'
                });

                const data = await response.json();
                console.log('Response:', data);

                if (response.ok && data.result) {
                    resultDiv.className = 'result success';
                    resultDiv.innerHTML = `
                        <h3>✅ Login Successful!</h3>
                        <pre>${JSON.stringify(data.result.data, null, 2)}</pre>
                        <p><a href="/home">Go to Home Page</a></p>
                    `;
                } else {
                    resultDiv.className = 'result error';
                    resultDiv.innerHTML = `
                        <h3>❌ Login Failed</h3>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (error) {
                resultDiv.className = 'result error';
                resultDiv.innerHTML = `
                    <h3>❌ Error</h3>
                    <p>${error.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
